<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text-dim: #6b6b8a;
    --user-bubble: #1e1a3a;
    --ai-bubble: #13131e;
    --success: #34d399;
    --warning: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 60%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(124,106,247,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Model selector */
  .model-select-wrapper {
    position: relative;
  }

  select {
    appearance: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 32px 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  select:hover { border-color: var(--accent); }

  .model-select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
    font-size: 11px;
  }

  /* Temp slider */
  .temp-control {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }

  input[type=range] {
    width: 80px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* Clear button */
  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-clear:hover {
    border-color: #ef4444;
    color: #ef4444;
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 820px;
    animation: fadeSlide 0.3s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    font-weight: 700;
  }

  .msg.user .avatar {
    background: linear-gradient(135deg, var(--accent), #5b4cf6);
    color: white;
  }

  .msg.assistant .avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent2);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
    max-width: calc(100% - 44px);
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 12px 4px 12px 12px;
    color: var(--text);
  }

  .msg.assistant .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 4px 12px 12px 12px;
  }

  .bubble pre {
    background: #0d0d17;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
  }

  .bubble code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: rgba(124,106,247,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent2);
  }

  .bubble pre code {
    background: none;
    padding: 0;
    color: var(--text);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 8px 0;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* System message */
  .system-msg {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 12px;
    background: var(--surface2);
    border-radius: 20px;
    align-self: center;
    border: 1px solid var(--border);
  }

  /* Input area */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 10;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 820px;
    margin: 0 auto;
  }

  #input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 10px;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 160px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  #input::placeholder { color: var(--text-dim); }
  #input:focus { border-color: var(--accent); }

  #send {
    background: var(--accent);
    border: none;
    color: white;
    width: 46px;
    height: 46px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 18px;
  }

  #send:hover { background: var(--accent2); transform: scale(1.05); }
  #send:active { transform: scale(0.97); }
  #send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 820px;
    margin: 6px auto 0;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Status badge */
  .status {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--success);
  }

  /* System prompt collapsible */
  .sys-prompt-section {
    max-width: 820px;
    margin: 0 auto 12px;
  }

  details summary {
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 0;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  details summary::before {
    content: '▶';
    font-size: 10px;
    transition: transform 0.2s;
  }

  details[open] summary::before { transform: rotate(90deg); }

  #system-prompt {
    width: 100%;
    margin-top: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    resize: vertical;
    outline: none;
    min-height: 64px;
    max-height: 140px;
    transition: border-color 0.2s;
  }

  #system-prompt:focus { border-color: var(--accent); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    color: var(--text-dim);
    animation: fadeSlide 0.5s ease;
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .empty-state h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    opacity: 0.6;
  }

  .empty-state p {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.5;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
    max-width: 480px;
  }

  .suggestion {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* Error */
  .error-bubble {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    align-self: flex-start;
    max-width: 600px;
    animation: fadeSlide 0.3s ease;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    AI Chat
  </div>
  <div class="header-controls">
    <div class="temp-control">
      <span>温度</span>
      <input type="range" id="temp" min="0" max="2" step="0.1" value="0.7">
      <span id="temp-val" style="font-family:'JetBrains Mono',monospace;font-size:12px;min-width:26px;">0.7</span>
    </div>
    <div class="model-select-wrapper">
      <select id="model">
        <option value="gpt-5.4">gpt-5.4</option>
        <option value="gpt-5.3-codex">gpt-5.3-codex</option>
        <option value="gpt-5.4-mini">gpt-5.4-mini</option>
        <option value="gpt-5.2">gpt-5.2</option>
        <option value="gpt-5.2-codex">gpt-5.2-codex</option>
        <option value="ddc">ddc</option>
        <option value="jdc">jdc</option>
      </select>
    </div>
    <button class="btn-clear" onclick="clearChat()">清空对话</button>
  </div>
</header>

<div id="messages">
  <div class="empty-state" id="empty">
    <div class="empty-icon">◈</div>
    <h2>开始对话</h2>
    <p>model: <span id="current-model-display">gpt-5.4</span></p>
    <div class="suggestions">
      <div class="suggestion" onclick="suggest(this)">你好，介绍一下你自己</div>
      <div class="suggestion" onclick="suggest(this)">写一段 Python 快速排序</div>
      <div class="suggestion" onclick="suggest(this)">解释量子纠缠</div>
      <div class="suggestion" onclick="suggest(this)">帮我写一封商务邮件</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="sys-prompt-section">
    <details>
      <summary>系统提示词（可选）</summary>
      <textarea id="system-prompt" placeholder="输入系统提示词..."></textarea>
    </details>
  </div>
  <div class="input-row">
    <textarea id="input" placeholder="输入消息... (Shift+Enter 换行，Enter 发送)" rows="1"></textarea>
    <button id="send" onclick="sendMessage()">↑</button>
  </div>
  <div class="input-meta">
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">就绪</span>
    </div>
    <span id="token-hint">Enter 发送 · Shift+Enter 换行</span>
  </div>
</div>

<script>
const API_BASE = 'http://ai.guanfeng.qzz.io/v1';
const API_KEY = 'sk-xxHZCssRKRBFQsDBTyIqUb3YjtJiZ7wz3jJ5jFq3la6h2ldM';

let history = [];
let isLoading = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const modelEl = document.getElementById('model');
const tempEl = document.getElementById('temp');
const tempValEl = document.getElementById('temp-val');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const emptyState = document.getElementById('empty');
const currentModelDisplay = document.getElementById('current-model-display');

// Temp display
tempEl.addEventListener('input', () => {
  tempValEl.textContent = tempEl.value;
});

// Model display
modelEl.addEventListener('change', () => {
  currentModelDisplay.textContent = modelEl.value;
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

// Enter to send
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!isLoading) sendMessage();
  }
});

function suggest(el) {
  inputEl.value = el.textContent;
  inputEl.dispatchEvent(new Event('input'));
  sendMessage();
}

function clearChat() {
  history = [];
  messagesEl.innerHTML = '';
  messagesEl.appendChild(emptyState);
  emptyState.style.display = 'flex';
  setStatus('就绪', true);
}

function setStatus(text, ready = false) {
  statusText.textContent = text;
  statusDot.style.background = ready ? 'var(--success)' : 'var(--warning)';
  statusDot.style.boxShadow = ready ? '0 0 6px var(--success)' : '0 0 6px var(--warning)';
}

function appendMsg(role, content) {
  if (emptyState.style.display !== 'none') {
    emptyState.style.display = 'none';
  }

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'U' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'assistant') {
    bubble.innerHTML = formatContent(content);
  } else {
    bubble.textContent = content;
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function appendTyping() {
  if (emptyState.style.display !== 'none') {
    emptyState.style.display = 'none';
  }
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.id = 'typing-msg';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function appendError(msg) {
  const el = document.createElement('div');
  el.className = 'error-bubble';
  el.textContent = '⚠ ' + msg;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function formatContent(text) {
  // Simple markdown-like formatting
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;
  setStatus('发送中...', false);

  history.push({ role: 'user', content: text });
  appendMsg('user', text);

  const typingBubble = appendTyping();

  const messages = [];
  const sysPrompt = document.getElementById('system-prompt').value.trim();
  if (sysPrompt) messages.push({ role: 'system', content: sysPrompt });
  messages.push(...history);

  try {
    const res = await fetch(`${API_BASE}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: modelEl.value,
        messages,
        temperature: parseFloat(tempEl.value),
        stream: true
      })
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`HTTP ${res.status}: ${err}`);
    }

    // Remove typing indicator, replace with streaming bubble
    const typingMsg = document.getElementById('typing-msg');
    typingBubble.innerHTML = '';
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    setStatus('接收中...', false);

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]') break;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            typingBubble.innerHTML = formatContent(fullText);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        } catch {}
      }
    }

    history.push({ role: 'assistant', content: fullText });
    setStatus('就绪', true);

  } catch (err) {
    // Remove typing indicator
    const typingMsg = document.getElementById('typing-msg');
    if (typingMsg) typingMsg.remove();
    history.pop(); // remove user msg from history on error
    appendError(err.message);
    setStatus('错误', false);
    setTimeout(() => setStatus('就绪', true), 3000);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
